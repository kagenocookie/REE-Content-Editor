classes:
  app.TimelineEventCostumeCatalog.Unit:
    id: [_CostumeId]
    subId: [_CostumeVariationId]
    to_string: "Costume {_CostumeId} (Variation: {_CostumeVariationId})"
    patcher:
      type: array-file
      file: natives/stm/event/resource/costumecatalog/ch0200.user.3
      # file: natives/stm/event/resource/costumecatalog/ch1300.user.3
  app.MontageData.MontageParts:
    to_string: "{_PartsName}: {_PrefabResource?.Path}"
  app.BounsMontageData:
    to_string: "Bonus Montage {_BonusID} - Model {_ModelID} / Preset {_DefaultPresetID}"
  app.BounsMontageData.ScenarioData:
    to_string: "ScenarioData {_Type} _PresetID={_PresetID}"
  app.NameHash:
    to_string: "NameHash: {_Hash}"
  app.FigureItemCatalog.Data:
    to_string: "FigureItemCatalogData {_BonusID} Category={_ItemCategoryID}"
  app.CharacterMontagePresetCatalogUserData.Entry:
    # TODO nested IDs not supported yet
    # id: [_Preset._ModelID]
    # subId: [_Preset._ID]
    to_string: "Montage Preset Entry [{_Preset._ModelID} / {_Preset._ID}] {:path(_Preset)}"
