entities:
  costumes.costume_catalog_unit:
    custom_id_range: [100000, 999999]
    to_string: "Costume [{data[0]?._CostumeId}]"
    fields:
      data:
        type: objectArray
        label: Data
        required: true
        param:
          classname: app.TimelineEventCostumeCatalog.Unit
